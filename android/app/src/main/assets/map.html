<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>PayBus Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; }
html, body { height: 100%; width: 100%; }
#map { height: 100%; width: 100%; }
.bus-icon { color: #1565C0; font-size: 18px; font-weight: bold; text-align: center; line-height: 24px; }
</style>
</head>
<body>
<div id="map"></div>
<script>
var map = L.map('map').setView([41.2995, 69.2401], 13);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
}).addTo(map);

var userMarker = null;
var stopMarkers = [];
var busMarkers = {};

function setUserLocation(lat, lng) {
    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.marker([lat, lng], {
        icon: L.divIcon({
            className: 'user-marker',
            html: '<div style="background:#1565C0;width:20px;height:20px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3)"></div>',
            iconSize: [26, 26],
            iconAnchor: [13, 13]
        })
    }).addTo(map).bindPopup('Sizning joylashuvingiz');
    map.setView([lat, lng], 15);
}

function addStopMarker(id, lat, lng, name, address) {
    var marker = L.marker([lat, lng], {
        icon: L.divIcon({
            className: 'stop-marker',
            html: '<div style="background:#fff;width:14px;height:14px;border-radius:50%;border:3px solid #1565C0;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></div>',
            iconSize: [20, 20],
            iconAnchor: [10, 10]
        })
    }).addTo(map).bindPopup('<b>' + name + '</b><br/>' + (address || ''));
    marker.on('click', function() {
        if (window.PayBusBridge) {
            PayBusBridge.onStopClick(id, name, address || '');
        }
    });
    marker._stopId = id;
    stopMarkers.push(marker);
}

function clearStopMarkers() {
    stopMarkers.forEach(function(m) { map.removeLayer(m); });
    stopMarkers = [];
}

function updateBusMarkers(buses) {
    var activeIds = {};
    buses.forEach(function(b) {
        activeIds[b.id] = true;
        var iconHtml = '<div style="background:#1565C0;color:#fff;width:24px;height:24px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold">' + b.route + '</div>';
        var popupText = '<b>№' + escapeHtml(b.route) + '</b><br/>' + escapeHtml(b.plate) + '<br/>' + escapeHtml(b.busType) + '<br/>' + b.speed + ' km/h';
        try {
            if (busMarkers[b.id]) {
                var m = busMarkers[b.id];
                m.setLatLng([b.lat, b.lng]);
                m.setPopupContent(popupText);
                m._busData = b;
            } else {
                var marker = L.marker([b.lat, b.lng], {
                    icon: L.divIcon({
                        className: 'bus-icon',
                        html: iconHtml,
                        iconSize: [30, 30],
                        iconAnchor: [15, 15]
                    })
                }).addTo(map).bindPopup(popupText);
                marker._busData = b;
                marker.on('click', function() {
                    var d = this._busData;
                    if (d && window.PayBusBridge) {
                        PayBusBridge.onBusClick(d.id, d.route, d.lat, d.lng, d.plate, d.busType, d.speed);
                    }
                });
                busMarkers[b.id] = marker;
            }
        } catch(e) { console.log('Bus marker error: ' + e.message); }
    });
    for (var id in busMarkers) {
        if (!activeIds[id]) {
            map.removeLayer(busMarkers[id]);
            delete busMarkers[id];
        }
    }
}

function escapeHtml(text) {
    if (!text) return '';
    return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function clearBusMarkers() {
    for (var id in busMarkers) {
        map.removeLayer(busMarkers[id]);
    }
    busMarkers = {};
}

function getCenter() {
    return { lat: map.getCenter().lat, lng: map.getCenter().lng };
}
</script>
</body>
</html>
